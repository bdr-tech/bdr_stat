name: bdr_tournament_recorder
description: "BDR Tournament Recorder - Tablet app for basketball game recording"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database (Drift/SQLite)
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # HTTP Client
  dio: ^5.6.0

  # Supabase (직접 DB 읽기 + Realtime)
  supabase_flutter: ^2.8.4

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # QR Scanner
  mobile_scanner: ^5.2.1

  # Routing
  go_router: ^14.2.7

  # Immutable Objects & JSON
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Fonts
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.4.2
  intl: ^0.19.0
  connectivity_plus: ^6.0.5
  battery_plus: ^6.0.3
  wakelock_plus: ^1.2.8
  shared_preferences: ^2.3.2
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.12
  drift_dev: ^2.20.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
